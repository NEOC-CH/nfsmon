# nfsmon theme: tokyo-night
#
# Codes match the upstream Tokyo Night palette
# (https://github.com/folke/tokyonight.nvim):
#   #c0caf5 fg       → 189
#   #7aa2f7 blue     → 111
#   #7dcfff cyan     → 117
#   #bb9af7 purple   → 141
#   #9ece6a green    → 149
#   #e0af68 yellow   → 179
#   #ff9e64 orange   → 215
#   #f7768e red      → 210
#   #565f89 slate    →  60

[colors]
title           = 111,bold
key_bar         = 117,bold
text            = 189
footer          = 111
alert           = 210,bold,blink
idle            = 60,dim
activity_low    = 117
activity_medium = 141,bold
activity_high   = 210,bold
