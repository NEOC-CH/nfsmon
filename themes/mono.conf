# nfsmon theme: mono
#
# Minimal monochrome — no color, just attribute differentiation. Useful on
# terminals without 256 colors, over screen sharing, or for accessibility.
# Activity tiers are distinguished by bold/dim only.

[colors]
title           = default,bold
key_bar         = default,bold,reverse
text            = default
footer          = default
alert           = default,bold,blink,reverse
idle            = default,dim
activity_low    = default
activity_medium = default,bold
activity_high   = default,bold,standout
