# nfsmon theme: dracula
#
# Codes match the upstream Dracula palette
# (https://draculatheme.com/contribute):
#   #BD93F9 purple   → 141
#   #FF79C6 pink     → 212
#   #F8F8F2 fg       → 255
#   #6272A4 comment  →  61
#   #50FA7B green    →  84
#   #F1FA8C yellow   → 228
#   #FF5555 red      → 203
#   #8BE9FD cyan     → 117
#   #FFB86C orange   → 215

[colors]
title           = 141,bold
key_bar         = 212,bold
text            = 255
footer          = 117
alert           = 203,bold,blink
idle            = 61,dim
activity_low    = 84
activity_medium = 228,bold
activity_high   = 141,bold
