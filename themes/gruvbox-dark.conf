# nfsmon theme: gruvbox-dark
#
# Codes match the upstream Gruvbox dark palette
# (https://github.com/morhetz/gruvbox):
#   #EBDBB2 fg1      → 223
#   #FB4934 red      → 167
#   #B8BB26 green    → 142
#   #FABD2F yellow   → 214
#   #83A598 blue     → 109
#   #D3869B purple   → 175
#   #8EC07C aqua     → 108
#   #FE8019 orange   → 208
#   #928374 gray     → 245

[colors]
title           = 214,bold
key_bar         = 208,bold
text            = 223
footer          = 109
alert           = 167,bold,blink
idle            = 245,dim
activity_low    = 142
activity_medium = 214,bold
activity_high   = 167,bold
