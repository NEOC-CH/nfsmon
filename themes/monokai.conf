# nfsmon theme: monokai
#
# Codes match the classic Monokai palette
# (https://monokai.pro/):
#   #F92672 pink     → 197
#   #A6E22E green    → 148
#   #E6DB74 yellow   → 186
#   #66D9EF cyan     →  81
#   #FD971F orange   → 208
#   #AE81FF purple   → 141
#   #F8F8F2 fg       → 255
#   #75715E comment  → 101

[colors]
title           = 197,bold
key_bar         = 148,bold
text            = 186
footer          = 81
alert           = 197,bold,blink
idle            = 101,dim
activity_low    = 148
activity_medium = 208,bold
activity_high   = 197,bold
