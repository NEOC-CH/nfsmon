# nfsmon theme: solarized-dark
#
# Codes match the upstream Solarized palette
# (https://ethanschoonover.com/solarized/):
#   #268bd2 blue     →  33
#   #2aa198 cyan     →  37
#   #859900 green    → 100
#   #b58900 yellow   → 136
#   #cb4b16 orange   → 166
#   #dc322f red      → 160
#   #d33682 magenta  → 162
#   #6c71c4 violet   →  61
#   #93a1a1 base1    → 109
#   #586e75 base01   →  60

[colors]
title           = 33,bold
key_bar         = 37,bold
text            = 109
footer          = 33
alert           = 160,bold,blink
idle            = 60,dim
activity_low    = 37
activity_medium = 136,bold
activity_high   = 166,bold
