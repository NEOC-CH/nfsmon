# nfsmon theme: default
#
# Drop into ~/.config/nfsmon/colors/default.conf, then set
# `theme = default` in [general] of nfsmon.conf (or pick from the
# [defaults] tab in the o-popup). Theme entries override [colors]
# from the main config per the documented precedence.

[colors]
title           = cyan,bold
key_bar         = yellow,bold
text            = green
footer          = cyan
alert           = red,bold,blink
idle            = white,dim
activity_low    = green
activity_medium = yellow,bold
activity_high   = red,bold
