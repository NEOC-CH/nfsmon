# nfsmon theme: cyberpunk
#
# Electric neon — peak magenta/pink and electric cyan. High contrast,
# high energy. Codes pick the most saturated pure-hue points in the
# 256-color cube.
#   201 #ff00ff   peak magenta
#   199 #ff00af   hot pink
#   207 #ff5fff   bright pink
#    51 #00ffff   electric cyan
#    87 #5fffff   light cyan
#   196 #ff0000   alert red
#   226 #ffff00   neon yellow
#   240          mid gray (idle)

[colors]
title           = 201,bold
key_bar         = 51,bold
text            = 87
footer          = 199
alert           = 201,bold,blink
idle            = 240,dim
activity_low    = 51
activity_medium = 201,bold
activity_high   = 196,bold,blink
