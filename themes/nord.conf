# nfsmon theme: nord
#
# Arctic / north-blue palette. Codes match the upstream Nord
# design tokens (https://www.nordtheme.com/) approximated to the
# 256-color cube:
#   #88C0D0 frost cyan      → 110
#   #8FBCBB frost teal      → 109
#   #5E81AC royal blue      →  67
#   #D8DEE9 snow            → 188
#   #BF616A aurora red      → 167
#   #A3BE8C aurora green    → 108
#   #EBCB8B aurora yellow   → 222
#   #B48EAD aurora purple   → 139

[colors]
title           = 110,bold
key_bar         = 109,bold
text            = 188
footer          = 67
alert           = 167,bold,blink
idle            = 188,dim
activity_low    = 108
activity_medium = 222,bold
activity_high   = 167,bold
