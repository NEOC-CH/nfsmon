# nfsmon theme: matrix
#
# All greens. The 256-color cube gives us a deep range from very dark
# (22 #005f00) to lime (46 #00ff00) — letting tiers stay readable
# without falling back to attribute-only differentiation.
#   22  #005f00   very dark green
#   28  #008700   dark green
#   34  #00af00   mid green
#   40  #00d700   bright green
#   46  #00ff00   lime / pure green

[colors]
title           = 46,bold
key_bar         = 46,bold
text            = 34
footer          = 28
alert           = 46,bold,blink,reverse
idle            = 22,dim
activity_low    = 28
activity_medium = 40,bold
activity_high   = 46,bold
