# nfsmon theme: amber-mono
#
# Amber CRT vibe. The 256-color amber/orange band gives us proper
# tiers from dim glow to peak brightness instead of relying on
# bold/dim alone.
#   130 #af5f00   deep amber
#   136 #af8700   warm amber
#   166 #d75f00   dark orange
#   172 #d78700   amber
#   178 #d7af00   warm gold
#   208 #ff8700   bright orange
#   214 #ffaf00   peak amber
#   220 #ffd700   pale gold

[colors]
title           = 214,bold
key_bar         = 220,bold
text            = 208
footer          = 172
alert           = 214,bold,blink,reverse
idle            = 130,dim
activity_low    = 166
activity_medium = 208
activity_high   = 220,bold
